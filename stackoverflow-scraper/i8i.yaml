jobTemplates:
  - templateName: "imageBuilder"
    jobName: ${JOB_NAME}
    jobType: container
    jobQueue: ${JOB_QUEUE}
    config:
      - compute:
          image: public.ecr.aws/b6g9t8f1/kaniko-executor-ecr:latest
          command:
            [
              "--context",
              "${REPO_URL}",
              "--context-sub-path",
              "${REPO_SUB_PATH}",
              "--dockerfile",
              "Dockerfile",
              "--destination",
              "381491877722.dkr.ecr.us-east-1.amazonaws.com/i8i:${IMAGE_TAG}",
              "--force",
            ]
          resourceRequirements:
            - type: VCPU
              value: "1"
            - type: MEMORY
              value: "4096"

workflowName: Stackoverflow Scraper
metadata:
  description: Scraper
config:
  storage:
    sharedVolumes:
      - volumeName: csv
        volumeType: EFS
workflows:
  - workflowName: Image build
    metadata:
      description: Build and push images to repo
    jobs:
      - templateName: imageBuilder
        templateParameters:
          JOB_NAME: Build image
          JOB_QUEUE: arn:aws:batch:us-east-1:381491877722:job-queue/fargateDemoQueue
          REPO_URL: git://github.com/i8i-io/i8i-examples.git
          REPO_SUB_PATH: ./stackoverflow-scraper
          IMAGE_TAG: stackoverflow-scraper

  - workflowName: Scrape
    dependsOn:
      - Image build
    metadata:
      description: Sample description
    jobs:
      - jobName: Scraper
        metadata:
          description: "Scraper "
        jobType: container
        jobQueue: arn:aws:batch:us-east-1:381491877722:job-queue/fargateDemoQueue
        arraySize: 1000
        config:
          - compute:
              image: 381491877722.dkr.ecr.us-east-1.amazonaws.com/i8i:stackoverflow-scraper
              resourceRequirements:
                - type: VCPU
                  value: "0.25"
                - type: MEMORY
                  value: "512"
